<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCAR.TN | Digital Casse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="180" height="45" style="vertical-align: middle;">
              <defs>
                <linearGradient id="tuncarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#0284c7" />
                  <stop offset="100%" stop-color="#10b981" />
                </linearGradient>
              </defs>
              <g transform="translate(10, 15)">
                <path d="M15 50 Q 30 20, 55 20 L 75 20 Q 90 35, 100 50" fill="none" stroke="url(#tuncarGrad)" stroke-width="5" stroke-linecap="round"/>
                <path d="M5 50 L 105 50" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                <circle cx="102" cy="50" r="5" fill="#10b981" />
              </g>
              <text x="135" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" fill="#f8fafc" letter-spacing="1.5">
                TUN<tspan fill="url(#tuncarGrad)">CAR</tspan><tspan font-size="22" font-weight="500" fill="#94a3b8">.TN</tspan>
              </text>
            </svg>
        </div>
        <div id="cart-status">🛒 السلة المضمونة (<span id="cart-count">0</span>)</div>
    </header>

    <main class="hero-container">
        <div class="search-box-uber">
            <h2>أين تجد قطعة غيارك القادمة؟</h2>
            <p>حدد مواصفات سيارتك أولاً، ثم اطلب أفضل عرض مضمون ومفحوص</p>
            
            <!-- الخطوة الأولى: كراج تحديد السيارة الذكي (Uber Ride Type style) -->
            <div class="car-selector-zone">
                <div class="select-group">
                    <select id="car-make" onchange="populateModels()">
                        <option value="">-- اختر الشركة المصنعة --</option>
                        <option value="volkswagen">Volkswagen</option>
                        <option value="peugeot">Peugeot</option>
                        <option value="renault">Renault</option>
                    </select>
                    
                    <select id="car-model">
                        <option value="">-- الموديل --</option>
                    </select>
                    
                    <select id="car-year">
                        <option value="">-- السنة --</option>
                        <option value="2012">2012</option>
                        <option value="2011">2011</option>
                        <option value="2010">2010</option>
                        <option value="2009">2009</option>
                        <option value="2008">2008</option>
                    </select>
                </div>
            </div>

            <!-- الخطوة الثانية: صندوق البحث المركزي التفاعلي -->
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="ما هي القطعة المطلوبة؟ (مثال: توربو، علبة سرعات...)">
                <button onclick="triggerSmartRouting()" class="btn-uber">ابحث عن أفضل عرض</button>
            </div>
        </div>

        <!-- الخطوة الثالثة: سيكشن استعراض العرض القائد الفائز (صندوق أسود مخفي المصدر) -->
        <section id="results-section" class="results-zone" style="display: none;">
            <h3>السيستم وجد لك العرض المضمون المتوافق مع سيارتك:</h3>
            <div id="winning-offer-card"></div>
        </section>
    </main>

    <script>
        // قواميس ديناميكية للموديلات التونسية الشائعة
        const modelsData = {
            volkswagen: ["Golf 6", "Golf 7", "Polo", "Passat"],
            peugeot: ["208", "308", "Partner"],
            renault: ["Clio 4", "Megane", "Symbol"]
        };

        function populateModels() {
            const make = document.getElementById('car-make').value;
            const modelSelect = document.getElementById('car-model');
            
            modelSelect.innerHTML = '<option value="">-- الموديل --</option>';
            
            if (make && modelsData[make]) {
                modelsData[make].forEach(model => {
                    let opt = document.createElement('option');
                    opt.value = model.toLowerCase().replace(" ", "-");
                    opt.innerText = model;
                    modelSelect.appendChild(opt);
                });
            }
        }

        let catalog = [];
        // جلب قاعدة البيانات المحدثة
        fetch('catalog.json')
            .then(res => res.json())
            .then(data => { catalog = data; updateCartCount(); });

        function triggerSmartRouting() {
            const make = document.getElementById('car-make').value;
            const model = document.getElementById('car-model').value;
            const query = document.getElementById('search-input').value.trim();

            if (!make || !model) return alert("الرجاء تحديد ماركة وموديل السيارة أولاً لتجنب عدم مطابقة القطعة!");
            if (!query) return alert("الرجاء كتابة اسم القطعة الميكانيكية أو الإلكترونية!");

            // فلترة مزدوجة: حسب اسم القطعة ومطابقتها لوصف السيارة في قاعدة البيانات
            let filteredParts = catalog.filter(item => {
                let matchQuery = item.name.toLowerCase().includes(query.toLowerCase()) || item.description.toLowerCase().includes(query.toLowerCase());
                let matchCar = item.name.toLowerCase().includes(model.replace("-", " "));
                return matchQuery && matchCar;
            });

            if (filteredParts.length === 0) return alert("القطعة المطلوبة غير متاحة حالياً لهذا الموديل بالذات، أو هي قيد الفحص الفني.");

            // خوارزمية الفرز الشهيرة حسب أعلى عائد مالي صافي للمنصة (العمولة الكبرى أولاً)
            filteredParts.sort((a, b) => {
                let rateA = (a.seller_metrics.total_sales_volume >= 10000 && a.seller_metrics.free_slots_remaining > 0) ? 0 : a.commission_rate;
                let rateB = (b.seller_metrics.total_sales_volume >= 10000 && b.seller_metrics.free_slots_remaining > 0) ? 0 : b.commission_rate;
                
                let netYieldA = a.current_price * rateA;
                let netYieldB = b.current_price * rateB;

                if (netYieldB === netYieldA) return a.current_price - b.current_price;
                return netYieldB - netYieldA;
            });

            renderWinningOffer(filteredParts[0]);
        }

        function renderWinningOffer(item) {
            document.getElementById('results-section').style.display = 'block';
            document.getElementById('winning-offer-card').innerHTML = `
                <div class="offer-card animate-fade">
                    <img src="${item.image_url}" alt="${item.name}">
                    <div class="offer-details">
                        <h4>${item.name}</h4>
                        <p class="status-tag">🛡️ متوافقة تماماً ومؤمنة بالفيديو بنظام ميكاترونيكس</p>
                        <p class="price-display">${item.current_price} TND</p>
                        <a href="product.html?id=${item.id}" class="btn-go">معاينة فيديو التشخيص وقفل السعر</a>
                    </div>
                </div>`;
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('tuncar_cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }
    </script>
</body>
</html>
