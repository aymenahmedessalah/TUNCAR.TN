<script src="js/app.js"></script>
    <script>
        const container = document.getElementById('sliderContainer');
        const slider = document.getElementById('infiniteSlider');
        
        // دالة سحب وقراءة ملف الـ JSON المرفوع على الموقع مباشرة واستهلاك الماركات
        async function loadSliderBrandsFromJSON() {
            try {
                // استدعاء ملف قاعدة البيانات الخاص بالموقع
                const response = await fetch('cars-db.json');
                if(!response.ok) throw new Error("قاعدة البيانات غير متوفرة حالياً");
                
                const db = await response.json();
                
                // تفريغ محتوى السلايدر لبنائه برمجياً من الملف
                slider.innerHTML = '';
                
                const brandList = Object.keys(db);
                
                if(brandList.length === 0) {
                    slider.innerHTML = '<div style="color:#6b7280; width:100%; text-align:center;">لا توجد ماركات في الملف</div>';
                    return;
                }

                // توليد الكروت الأصلية بناء على ماركات الملف
                brandList.forEach(brand => {
                    const card = document.createElement('div');
                    card.className = 'brand-card';
                    card.setAttribute('data-brand', brand);
                    card.innerHTML = `<span>${brand}</span><small>المخزن الذكي</small>`;
                    slider.appendChild(card);
                });

                // مضاعفة الكروت برمجياً ثلاث مرات لضمان حركة الـ 360 درجة المتصلة دون حد غلق
                const originalCards = Array.from(slider.children);
                originalCards.forEach(card => {
                    let cloneBefore = card.cloneNode(true);
                    let cloneAfter = card.cloneNode(true);
                    slider.insertBefore(cloneBefore, slider.firstChild);
                    slider.appendChild(cloneAfter);
                });

                // تفعيل المنظومة الفيزيائية المتناسبة للحركة بعد بناء الكروت
                setupSliderPhysics(originalCards.length, db);

            } catch (error) {
                console.error("خطأ ميكانيكي في سحب ملف الـ JSON:", error);
                slider.innerHTML = '<div style="color:#ef4444; width:100%; text-align:center;">فشل قراءة ملف cars-db.json</div>';
            }
        }

        // هندسة الحركية والتناسب التام والتحكم بالفأرة والكيبورد
        function setupSliderPhysics(originalLength, fullDatabase) {
            let isDown = false;
            let startX, scrollLeft;
            let isDragging = false;

            const firstCard = slider.querySelector('.brand-card');
            if(!firstCard) return;

            // حساب الأبعاد والمسافات بالـ Pixels بدقة كرت الشاشة لتثبيت التناسب 1:1
            const cardWidth = firstCard.getBoundingClientRect().width + 30; 
            const totalOriginalWidth = cardWidth * originalLength;

            // تمرير افتراضي لمنتصف السلسلة المتصلة
            slider.scrollLeft = totalOriginalWidth;

            function updateCenterFocus() {
                const cards = slider.querySelectorAll('.brand-card');
                const containerCenter = slider.getBoundingClientRect().left + (slider.offsetWidth / 2);
                
                let closestCard = null;
                let minDistance = Infinity;

                cards.forEach(card => {
                    const cardRect = card.getBoundingClientRect();
                    const cardCenter = cardRect.left + (cardRect.width / 2);
                    const distance = Math.abs(containerCenter - cardCenter);

                    if (distance < minDistance) {
                        minDistance = distance;
                        closestCard = card;
                    }
                });

                cards.forEach(card => card.classList.remove('focused'));
                if (closestCard) {
                    closestCard.classList.add('focused');
                }
            }

            function handleInfiniteScroll() {
                if (slider.scrollLeft < 10) {
                    slider.scrollLeft += totalOriginalWidth;
                } else if (slider.scrollLeft >= slider.scrollWidth - slider.offsetWidth - 10) {
                    slider.scrollLeft -= totalOriginalWidth;
                }
                updateCenterFocus();
            }

            slider.addEventListener('scroll', handleInfiniteScroll);

            // تدوير روليت الماوس بدون فرملة أو تشنج
            slider.addEventListener('wheel', (e) => {
                e.preventDefault();
                slider.scrollLeft += e.deltaY * 1.0; 
            }, { passive: false });

            // الضغط والسحب من أي فراغ أو أيقونة بشكل متناسب تماماً
            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                isDragging = false;
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });

            window.addEventListener('mouseup', () => {
                if (!isDown) return;
                isDown = false;
                setTimeout(snapToCenterSmooth, 30);
            });

            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 1.0; 
                if (Math.abs(walk) > 3) isDragging = true;
                slider.scrollLeft = scrollLeft - walk;
            });

            // معالجة اختيار الماركات
            slider.querySelectorAll('.brand-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (isDragging) return; 
                    selectBrand(card);
                });
            });

            function snapToCenterSmooth() {
                const focused = slider.querySelector('.brand-card.focused');
                if (focused) {
                    const containerCenter = slider.offsetWidth / 2;
                    const cardCenter = focused.offsetLeft + (focused.offsetWidth / 2);
                    slider.scrollTo({ left: cardCenter - containerCenter, behavior: 'smooth' });
                }
            }

            function selectBrand(cardElement) {
                if(!cardElement) return;
                const brandName = cardElement.getAttribute('data-brand');
                document.getElementById('brandSearchInput').value = brandName + " ";
                document.getElementById('brandSearchInput').focus();
                
                const containerCenter = slider.offsetWidth / 2;
                const cardCenter = cardElement.offsetLeft + (cardElement.offsetWidth / 2);
                
                slider.scrollTo({ left: cardCenter - containerCenter, behavior: 'smooth' });
                cardElement.style.borderColor = "var(--cyber-green)";
                setTimeout(() => updateCenterFocus(), 250);

                // الكشف عن الموديلات المستخرجة من ملف الـ JSON
                if(fullDatabase[brandName]) {
                    console.log(`الموديلات النشطة من الملف لـ ${brandName}:`, Object.keys(fullDatabase[brandName]));
                }
            }

            // نظام لوحة المفاتيح والأسهم
            container.addEventListener('keydown', (e) => {
                const cards = Array.from(slider.querySelectorAll('.brand-card'));
                const focusedIndex = cards.findIndex(c => c.classList.contains('focused'));
                
                if (e.key === 'ArrowLeft') { 
                    e.preventDefault();
                    if (focusedIndex < cards.length - 1) selectBrand(cards[focusedIndex + 1]);
                } else if (e.key === 'ArrowRight') { 
                    e.preventDefault();
                    if (focusedIndex > 0) selectBrand(cards[focusedIndex - 1]);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    const currentFocused = slider.querySelector('.brand-card.focused');
                    if (currentFocused) {
                        selectBrand(currentFocused);
                        executeSearch();
                    }
                }
            });

            // تفعيل التحجيم والضبط عند التشغيل لأول مرة
            updateCenterFocus();
            snapToCenterSmooth();
        }

        function executeSearch() {
            const query = document.getElementById('brandSearchInput').value.trim().toUpperCase();
            if(query !== "") {
                alert(`🔍 جاري البحث الديناميكي في ملف cars-db.json عن: ${query}`);
            }
        }

        // تشغيل سحب وقراءة الملف فور تحميل الصفحة بالكامل
        window.addEventListener('load', loadSliderBrandsFromJSON);
    </script>
