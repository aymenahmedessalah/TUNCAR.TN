<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCAR | المنصة الذكية لقطع غيار السيارات</title>
    <style>
        :root {
            --primary-dark: #0b1329;
            --bg-main: #030712;
            --cyber-blue: #00f2fe;
            --text-light: #f3f4f6;
            --border-blue: #1f3a60;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        /* شريط التنقل */
        .navbar {
            background: var(--primary-dark);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-blue);
        }
        .logo {
            color: var(--cyber-blue);
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo span { color: #fff; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #9ca3af; text-decoration: none; font-size: 14px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--cyber-blue); }
        
        /* واجهة العرض للمستخدم */
        .hero-section {
            text-align: center;
            padding: 120px 20px;
            background: radial-gradient(circle at 50% 50%, #0d1b3e 0%, transparent 70%);
        }
        .hero-section h2 { font-size: 36px; margin-bottom: 20px; }
        .hero-section p { color: #9ca3af; max-width: 600px; margin: 0 auto 30px; }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-blue);
            background: var(--primary-dark);
            color: #fff;
        }
        .search-box button {
            padding: 12px 25px;
            background: var(--cyber-blue);
            border: none;
            border-radius: 8px;
            color: #030712;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: var(--primary-dark);
            border-top: 1px solid var(--border-blue);
            font-size: 12px;
            color: #6b7280;
            position: fixed;
            bottom: 0; width: 100%; box-sizing: border-box;
        }
        .secret-trigger { background: transparent; border: none; color: #1f3a60; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="site-wrapper">
        <!-- شريط التنقل العلوي -->
        <nav class="navbar" id="navbar-view">
            <div class="logo">TUNCAR<span>.TN</span></div>
            <div class="nav-links">
                <a href="#">الرئيسية</a>
                <a href="#">المحركات</a>
                <a href="#">قطع الغيار</a>
                <a href="#">حسابي</a>
            </div>
        </nav>

        <!-- المحتوى الرئيسي القابل للتغير -->
        <main id="main-content">
            <section class="hero-section">
                <h2>أول منصة ذكية لقطع غيار السيارات في تونس</h2>
                <p>ابحث عن قطع الغيار الدقيقة لسيارتك بضغطة زر واحدة ومن أي مكان.</p>
                <div class="search-box">
                    <input type="text" placeholder="أدخل رقم القطعة أو اسم السيارة (مثال: Golf 6 Culasse)...">
                    <button>ابحث الآن</button>
                </div>
            </section>
        </main>

        <!-- تذييل الصفحة مع الزر المخفي -->
        <footer>
            <span>© 2026 TUNCAR. جميع الحقوق محفوظة.</span>
            <button class="secret-trigger" onclick="requestAdminAccess()">•</button>
        </footer>
    </div>

    <!-- استدعاء ملفات التحكم -->
    <script src="js/app.js"></script>
</body>
</html>
