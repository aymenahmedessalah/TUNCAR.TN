<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الكتالوج الرقمي الموحد والتجارة الإلكترونية</title>
    <style>
        :root {
            --bg-main: #070a13;
            --bg-card: #0f1422;
            --bg-input: #171e30;
            --border-color: #242f4d;
            --neon-blue: #38bdf8;
            --neon-glow: rgba(56, 189, 248, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #64748b;
            --neon-green: #22c55e;
            --neon-amber: #eab308;
            --neon-red: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            padding: 15px; 
            color: var(--text-main); 
            background-image: radial-gradient(circle at top center, rgba(56, 189, 248, 0.03), transparent 50%);
        }
        
        .lang-bar { width: 100%; margin: 0 auto 15px auto; display: flex; justify-content: flex-end; gap: 10px; }
        .lang-btn { padding: 6px 14px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-muted); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .lang-btn.active { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-glow); }
        
        .container { width: 100%; box-sizing: border-box; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #04070d; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; gap: 15px; }
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        
        .back-btn, .home-btn { background: #1e293b; color: var(--text-main); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; visibility: hidden; }
        .back-btn:hover, .home-btn:hover { background: #334155; border-color: var(--neon-blue); }
        .home-btn { background: #0f172a; border-color: #334155; }
        
        .breadcrumbs { font-family: monospace; font-size: 13px; color: var(--neon-blue); display: flex; gap: 5px; flex-wrap: wrap; text-align: inherit; }
        
        .cart-status { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .cart-total { font-size: 16px; font-weight: bold; color: var(--neon-green); font-family: monospace; }
        .cart-count { background: var(--neon-blue); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; }

        html[dir="rtl"] .top-bar, html[dir="rtl"] table, html[dir="rtl"] .filter-box { text-align: right; }
        html[dir="ltr"] .top-bar, html[dir="ltr"] table, html[dir="ltr"] .filter-box { text-align: left; }
        html[dir="rtl"] .back-btn-icon { transform: rotate(0deg); }
        html[dir="ltr"] .back-btn-icon { transform: rotate(180deg); }

        .unified-viewport { min-height: 350px; position: relative; width: 100%; }
        .step-panel { width: 100%; display: none; }
        .step-panel.active { display: block; }

        .carousel-wrapper { width: 100%; position: relative; overflow: hidden; background: #04070d; padding: 30px 0; border-radius: 12px; border: 1px solid var(--border-color); cursor: grab; user-select: none; direction: ltr !important; mask-image: linear-gradient(to right, transparent, #000 15%, #000 85%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, #000 15%, #000 85%, transparent); }
        .carousel-wrapper:active { cursor: grabbing; }
        .carousel-track { display: flex; gap: 35px; width: max-content; will-change: transform; transform: translateX(0px); }
        
        .circle-item { width: 100px; height: 100px; background: #0b0f19; border: 2px solid var(--border-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer; position: relative; }
        .circle-item:hover, .circle-item.active-cat { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-glow); transform: scale(1.05); }
        .circle-icon-placeholder { font-size: 24px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .circle-item.active-cat .circle-icon-placeholder { color: var(--neon-blue); }
        
        .circle-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 6px; text-align: center; width: 110px; transition: all 0.25s; }
        .circle-item.active-cat + .circle-label { color: var(--neon-blue) !important; font-size: 14px !important; font-weight: bold; }

        .mini-category-wrapper { padding: 12px 0 !important; background: #050810 !important; border-radius: 8px !important; }
        .circle-item-mini { width: 55px !important; height: 55px !important; background: #0b0f19; border: 1px solid var(--border-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s ease; cursor: pointer; }
        .circle-item-mini:hover, .circle-item-mini.active-cat { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-glow); transform: scale(1.03); }
        .circle-item-mini .circle-icon-placeholder { font-size: 18px !important; }
        .circle-label-mini { font-size: 11px !important; font-weight: 600; color: var(--text-muted); margin-top: 4px; text-align: center; transition: all 0.2s; }
        .circle-item-mini.active-cat + .circle-label-mini { color: var(--neon-blue) !important; font-weight: bold; }

        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 10px; }
        .model-card { background: #0b0f19; border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.25s ease; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .model-card:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-glow); transform: translateY(-3px); }
        .model-img-placeholder { width: 100%; height: 80px; background: var(--bg-input); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-muted); font-weight: bold; border: 1px dashed var(--border-color); }

        .chips-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 10px; }
        .chip-item { padding: 10px 20px; border: 1px solid var(--border-color); border-radius: 30px; background: var(--bg-input); cursor: pointer; font-weight: 600; font-size: 13px; color: var(--text-main); transition: all 0.2s ease; text-align: center; min-width: 80px; user-select: none; }
        .chip-item:hover { border-color: var(--neon-blue); color: var(--neon-blue); transform: scale(1.02); }

        .map-dashboard-layout { display: flex; background: #04070d; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 12px; height: 260px; }
        .map-sidebar-list { width: 200px; background: #060912; display: flex; flex-direction: column; padding: 15px 0; border-inline-end: 1px solid var(--border-color); box-sizing: border-box; justify-content: center; gap: 4px; }
        .sidebar-item-text { padding: 10px 24px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; user-select: none; transition: all 0.25s ease; position: relative; }
        .sidebar-item-text:hover { color: var(--text-main); }
        .sidebar-item-text.selected-sys { color: var(--neon-blue) !important; font-weight: bold; background: rgba(56, 189, 248, 0.04); }
        html[dir="rtl"] .sidebar-item-text.selected-sys { border-right: 3px solid var(--neon-blue); }
        html[dir="ltr"] .sidebar-item-text.selected-sys { border-left: 3px solid var(--neon-blue); }

        .svg-map-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; background: #020408; }
        .subsystem-group rect, .subsystem-group path, .subsystem-group polygon { stroke-width: 1.5; cursor: pointer; transition: all 0.3s; fill: transparent; }
        .subsystem-group text { font-size: 11px; font-weight: bold; pointer-events: none; }
        
        .sys-engine { stroke: #ef4444; }
        .sys-suspension { stroke: #22c55e; }
        .sys-body { stroke: #38bdf8; }
        .sys-electrical { stroke: #eab308; }
        
        .subsystem-group:hover rect, .subsystem-group:hover path, .subsystem-group:hover polygon { stroke-width: 2.5; filter: drop-shadow(0 0 6px var(--neon-blue)); }
        .subsystem-group.selected-sys rect, .subsystem-group.selected-sys path, .subsystem-group.selected-sys polygon { fill: rgba(56, 189, 248, 0.12) !important; stroke: var(--neon-blue) !important; filter: drop-shadow(0 0 8px var(--neon-glow)); }

        .filter-section-tags { display: flex; flex-direction: column; gap: 15px; background: #04070d; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .filter-box { display: flex; flex-direction: column; gap: 8px; }
        .filter-box label { font-size: 12px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .tag-filter { padding: 6px 14px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; user-select: none; }
        .tag-filter:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
        .tag-filter.active { border-color: var(--neon-blue); background: rgba(56, 189, 248, 0.15); color: var(--neon-blue); }
        
        .sub-condition-container { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px; background: #0b111e; border-radius: 8px; border: 1px dashed var(--border-color); display: none; margin-top: 5px; }

        .parts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; text-align: center; }
        .part-card { background: #0b0f19; border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: all 0.25s ease; position: relative; }
        .part-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        .part-img-box { width: 100%; height: 110px; background: var(--bg-input); border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px dashed var(--border-color); color: var(--text-muted); font-size: 32px; cursor: pointer; }
        .part-img-box:hover { background: #1f2942; color: var(--neon-blue); }
        .part-title { font-size: 13px; font-weight: 700; color: #fff; min-height: 38px; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        .part-badges { display: flex; gap: 5px; justify-content: center; width: 100%; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-new { background: rgba(34, 197, 94, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .badge-used { background: rgba(234, 179, 8, 0.1); color: var(--neon-amber); border: 1px solid var(--neon-amber); }
        .badge-sub { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        
        .part-price-zone { width: 100%; display: flex; flex-direction: column; gap: 5px; background: #04070d; padding: 10px; border-radius: 8px; box-sizing: border-box; border: 1px solid #141b2d; text-align: right; }
        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .part-price { font-size: 16px; font-weight: 800; color: var(--neon-blue); font-family: monospace; }
        .reference-new-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .reference-new-value { font-size: 12px; color: var(--neon-green); font-family: monospace; font-weight: bold; }

        .part-micro-gauge-box { width: 100%; display: flex; flex-direction: column; gap: 4px; text-align: right; box-sizing: border-box; }
        .gauge-label-container { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .gauge-status-text { font-weight: bold; }
        
        .micro-gauge-bar-bg { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; position: relative; }
        .micro-gauge-bar-fill { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.4s; border-radius: 3px; }

        .buy-btn { width: 100%; background: var(--neon-blue); color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .image-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 7, 13, 0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .image-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content-box { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 16px; padding: 25px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; transform: scale(0.8); transition: transform 0.3s ease; }
        .image-modal-overlay.active .modal-content-box { transform: scale(1); }
        .modal-large-img { width: 120px; height: 120px; background: #04070d; border-radius: 12px; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; font-size: 55px; border: 1px solid var(--border-color); }
        .modal-title { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .modal-price { font-size: 22px; color: var(--neon-blue); font-weight: bold; font-family: monospace; margin-bottom: 15px; }
        .close-modal-btn { position: absolute; top: 15px; left: 15px; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="lang-bar">
    <button class="lang-btn active" onclick="switchLanguage('tn')">تُونسي (Tounsi)</button>
    <button class="lang-btn" onclick="switchLanguage('ar')">العربية</button>
    <button class="lang-btn" onclick="switchLanguage('fr')">Français</button>
    <button class="lang-btn" onclick="switchLanguage('en')">English</button>
</div>

<div class="container">
    <div class="top-bar">
        <div class="nav-buttons">
            <button class="back-btn" id="backBtn" onclick="goBack()"><span class="back-btn-icon">➔</span> <span id="lbl-back">عودة</span></button>
            <button class="home-btn" id="homeBtn" onclick="goHome()">🏠 <span id="lbl-home">الرئيسية</span></button>
        </div>
        <div class="breadcrumbs" id="breadcrumbs">البداية / اختيار الماركة</div>
        
        <div class="cart-status" id="cartWrapper">
            <span id="lbl-cart">قائمة المشتريات:</span> <span class="cart-count" id="cartCount">0</span>
            <span class="cart-total" id="cartTotal">0.000 DT</span>
        </div>
    </div>
    
    <div class="unified-viewport">
        
        <div id="step-1" class="step-panel active">
            <div class="carousel-wrapper" id="carouselViewport">
                <div class="carousel-track" id="brandTrack"></div>
            </div>
        </div>

        <div id="step-2" class="step-panel">
            <div class="models-grid" id="modelsGrid"></div>
        </div>

        <div id="step-3" class="step-panel">
            <div class="chips-grid" id="variantsGrid"></div>
        </div>

        <div id="step-4" class="step-panel">
            <div class="chips-grid" id="yearsGrid"></div>
        </div>

        <div id="step-5" class="step-panel">
            
            <div class="map-dashboard-layout">
                <div class="map-sidebar-list" id="mapSidebarList">
                    <div class="sidebar-item-text selected-sys" id="side-Engine" onclick="selectSubSysFromMap('Engine')">المحرك</div>
                    <div class="sidebar-item-text" id="side-Suspension" onclick="selectSubSysFromMap('Suspension')">التعليق</div>
                    <div class="sidebar-item-text" id="side-Body" onclick="selectSubSysFromMap('Body')">الهيكل والأضواء</div>
                    <div class="sidebar-item-text" id="side-Electrical" onclick="selectSubSysFromMap('Electrical')">الكهرباء</div>
                </div>

                <div class="svg-map-area">
                    <svg viewBox="0 0 650 250" style="width:100%; height:100%;">
                        <g id="golf6-chassis-outline" stroke="#1e293d" stroke-width="2" fill="none">
                            <path d="M 40 155 C 40 145, 45 130, 60 125 C 80 120, 130 115, 175 90 C 205 72, 395 72, 420 72 C 455 72, 535 80, 560 92 C 585 105, 590 125, 590 145 C 590 160, 580 168, 565 168 L 525 168 C 525 140, 465 140, 465 168 L 195 168 C 195 140, 135 140, 135 168 L 65 168 C 50 168, 40 162, 40 155 Z" />
                            <path d="M 215 95 L 375 95 L 375 125 L 200 125 Z" stroke-width="1.5"/>
                            <path d="M 385 95 L 515 95 C 530 102, 538 115, 538 125 L 385 125 Z" stroke-width="1.5"/>
                            <path d="M 175 118 C 165 118, 160 124, 172 126 C 182 127, 185 118, 175 118 Z" />
                            <circle cx="165" cy="168" r="32" stroke-width="3"/>
                            <circle cx="165" cy="168" r="22" stroke-dasharray="4 2"/>
                            <circle cx="495" cy="168" r="32" stroke-width="3"/>
                            <circle cx="495" cy="168" r="22" stroke-dasharray="4 2"/>
                        </g>

                        <g class="subsystem-group sys-engine selected-sys" id="sys-Engine" onclick="selectSubSysFromMap('Engine')">
                            <polygon points="45,130 135,123 180,135 180,165 95,165" stroke-dasharray="4 3"/>
                            <text id="txt-map-Engine" x="120" y="150" fill="#ef4444" font-weight="bold">المحرك</text>
                        </g>
                        <g class="subsystem-group sys-suspension" id="sys-Suspension" onclick="selectSubSysFromMap('Suspension')">
                            <path d="M 125,168 A 40,40 0 0,1 205,168 L 455,168 A 40,40 0 0,1 535,168" stroke-dasharray="5 4"/>
                            <text id="txt-map-Suspension" x="325" y="210" fill="#22c55e" font-weight="bold">التعليق</text>
                        </g>
                        <g class="subsystem-group sys-body" id="sys-Body" onclick="selectSubSysFromMap('Body')">
                            <path d="M 195,90 L 415,90 L 555,110 L 585,135 L 535,135 L 195,135 Z" stroke-dasharray="4 3"/>
                            <text id="txt-map-Body" x="325" y="115" fill="#38bdf8" font-weight="bold">الهيكل والأضواء</text>
                        </g>
                        <g class="subsystem-group sys-electrical" id="sys-Electrical" onclick="selectSubSysFromMap('Electrical')">
                            <rect x="195" y="120" width="130" height="40" rx="5" stroke-dasharray="4 3"/>
                            <text id="txt-map-Electrical" x="260" y="145" fill="#eab308" font-weight="bold">الكهرباء</text>
                        </g>
                    </svg>
                </div>
            </div>

            <div class="filter-section-tags">
                <div class="filter-box">
                    <label id="lbl-f-cat">التصنيف (Category)</label>
                    <div class="carousel-wrapper mini-category-wrapper">
                        <div class="carousel-track" id="categoryCircleTrack" style="gap: 15px; align-items: center; justify-content: center; width: 100%;"></div>
                    </div>
                </div>

                <div class="filter-box">
                    <label id="lbl-f-cond">الحالة الأساسية (Condition)</label>
                    <div class="tags-container" id="conditionTagsContainer">
                        <div class="tag-filter active" id="tc-new" onclick="selectConditionFromTag('new')">جديد باكور (New)</div>
                        <div class="tag-filter" id="tc-used" onclick="selectConditionFromTag('used')">مستعمل (Used)</div>
                    </div>
                    
                    <div class="sub-condition-container" id="subConditionWrapper">
                        <div class="tag-filter active" id="tsc-all" onclick="setSubConditionTag('all')">الكل الفئات</div>
                        <div class="tag-filter" id="tsc-likenew" onclick="setSubConditionTag('used like new')">Used like new</div>
                        <div class="tag-filter" id="tsc-used" onclick="setSubConditionTag('used')">Used</div>
                        <div class="tag-filter" id="tsc-trash" onclick="setSubConditionTag('trash')">Trash</div>
                    </div>
                </div>
            </div>

            <div class="parts-grid" id="partsGrid"></div>
        </div>

    </div>
</div>

<div class="image-modal-overlay" id="imageModal" onclick="closeImagePreview(event)">
    <div class="modal-content-box" onclick="event.stopPropagation()">
        <button class="close-modal-btn" onclick="toggleModal(false)">✕</button>
        <div class="modal-large-img" id="modalImg">⚙️</div>
        <div class="modal-title" id="modalTitle">اسم قطعة الغيار</div>
        <div class="modal-price" id="modalPrice">0 DT</div>
        <button class="buy-btn" id="modalBuyBtn" style="font-size:15px; padding:10px;">🛒 أضف للطلب</button>
    </div>
</div>

<script>
    const dictionary = {
        tn: { dir: "rtl", back: "عودة", home: "الرئيسية", cart: "قائمة المشتريات:", fCat: "التصنيف", fCond: "الحالة الأساسية", marketState: "مؤشر السعر المرجعي:", refNewLabel: "سعرها جديد:", safe: "فرصة ممتازة", warning: "مقبول", alert: "غالي جداً", sys: { Engine: "المحرك", Suspension: "التعليق", Body: "الهيكل والأضواء", Electrical: "الكهرباء" } },
        ar: { dir: "rtl", back: "عودة", home: "الرئيسية", cart: "سلة المشتريات:", fCat: "الفئة", fCond: "حالة القطعة", marketState: "حالة السعر التقديري:", refNewLabel: "السعر الأصلي جديد:", safe: "فرصة ممتازة", warning: "متوسط", alert: "مرتفع", sys: { Engine: "المحرك", Suspension: "التعليق", Body: "الهيكل والأضواء", Electrical: "الكهرباء" } },
        fr: { dir: "ltr", back: "Retour", home: "Accueil", cart: "Panier:", fCat: "Catégorie", fCond: "État", marketState: "Indicateur:", refNewLabel: "Prix Neuf Ref:", safe: "Top Affaire", warning: "Moyen", alert: "Cher", sys: { Engine: "Engine", Suspension: "Suspension", Body: "Body & Lights", Electrical: "Electrical" } },
        en: { dir: "ltr", back: "Back", home: "Home", cart: "Cart Total:", fCat: "Category", fCond: "Condition", marketState: "Market Gauge:", refNewLabel: "Price if New:", safe: "Great Deal", warning: "Average", alert: "Overpriced", sys: { Engine: "Engine", Suspension: "Suspension", Body: "Body & Lights", Electrical: "Electrical" } }
    };

    const vehicleData = {
        vw: { name: "Volkswagen", initials: "VW", models: { "Golf 6": ["1.4 TSI", "2.0 TDI"], "Polo": ["1.2 HTP"] } },
        peugeot: { name: "Peugeot", initials: "PE", models: { "208": ["1.2 PureTech"], "308": ["1.6 BlueHDi"] } },
        kia: { name: "KIA Motors", initials: "KIA", models: { "Rio": ["1.2 MPI"], "Sportage": ["1.6 GDI"] } }
    };

    const catalogData = {
        Engine: {
            categories: { "Culasse": { newPrice: 1500, avgUsed: 750, icon: "⚙️" }, "Kit Embrayage": { newPrice: 500, avgUsed: 300, icon: "🔄" }, "Turbocharger": { newPrice: 1900, avgUsed: 950, icon: "🌀" } },
            parts: [
                { name: "Culasse Complet OEM", cat: "Culasse", cond: "new", subCond: "", price: 1500, marketReference: 1600, img: "⚙️" },
                { name: "Culasse d'origine importé", cat: "Culasse", cond: "used", subCond: "used like new", price: 850, marketReference: 1500, img: "🔧" },
                { name: "Culasse d'origine standard", cat: "Culasse", cond: "used", subCond: "used", price: 720, marketReference: 1500, img: "🔧" },
                { name: "Kit Embrayage Sachs Original", cat: "Kit Embrayage", cond: "new", subCond: "", price: 500, marketReference: 550, img: "🔄" },
                { name: "Turbo Garrett Golf 6", cat: "Turbocharger", cond: "new", subCond: "", price: 1900, marketReference: 1950, img: "🌀" }
            ]
        },
        Suspension: {
            categories: { "Amortisseurs": { newPrice: 420, avgUsed: 210, icon: "🛑" }, "Disques de Frein": { newPrice: 280, avgUsed: 130, icon: "🔩" } },
            parts: [
                { name: "Paire Amortisseurs Avant Bilstein", cat: "Amortisseurs", cond: "new", subCond: "", price: 420, marketReference: 450, img: "🛑" },
                { name: "Amortisseurs d'origine Occasion", cat: "Amortisseurs", cond: "used", subCond: "used", price: 180, marketReference: 420, img: "🔩" }
            ]
        },
        Body: {
            categories: { "Optiques": { newPrice: 850, avgUsed: 400, icon: "💡" } },
            parts: [
                { name: "Optique Avant Full LED R-Line", cat: "Optiques", cond: "new", subCond: "", price: 850, marketReference: 900, img: "💡" },
                { name: "Optique Gauche Occasion", cat: "Optiques", cond: "used", subCond: "used like new", price: 450, marketReference: 850, img: "💡" }
            ]
        },
        Electrical: {
            categories: { "Alternateur": { newPrice: 650, avgUsed: 300, icon: "⚡" }, "Calculateur (ECU)": { newPrice: 1400, avgUsed: 600, icon: "💻" } },
            parts: [
                { name: "Alternateur Bosch 140A", cat: "Alternateur", cond: "new", subCond: "", price: 650, marketReference: 700, img: "⚡" },
                { name: "Alternateur Occasion", cat: "Alternateur", cond: "used", subCond: "used", price: 320, marketReference: 650, img: "⚡" }
            ]
        }
    };

    let currentStep = 1; let currentLang = 'tn';
    let selectedBrand = '', selectedModel = '', selectedVariant = '', selectedYear = '';
    let activeSubSys = 'Engine'; let activeCategory = ''; let activeCondition = 'new';
    let activeSubCondition = 'all'; let cartTotalAmount = 0, cartItemCount = 0;

    const viewport = document.getElementById('carouselViewport');
    const track = document.getElementById('brandTrack');
    let singleSetWidth = 0, baseCenter = 0, currentTranslate = 0;
    let isDragging = false, startX = 0, startTranslate = 0, wasDragged = false;

    window.onload = function() { initBrandsCarousel(); updateStepView(1); };

    function switchLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-bar .lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const htmlTag = document.getElementById('htmlTag');
        htmlTag.setAttribute('dir', dictionary[lang].dir);
        htmlTag.setAttribute('lang', lang);
        
        document.getElementById('lbl-back').innerText = dictionary[lang].back;
        document.getElementById('lbl-home').innerText = dictionary[lang].home;
        document.getElementById('lbl-cart').innerText = dictionary[lang].cart;
        document.getElementById('lbl-f-cat').innerText = dictionary[lang].fCat;
        document.getElementById('lbl-f-cond').innerText = dictionary[lang].fCond;

        const sysList = dictionary[lang].sys;
        Object.keys(sysList).forEach(key => {
            const sideItem = document.getElementById(`side-${key}`);
            if(sideItem) sideItem.innerText = sysList[key];
            const mapText = document.getElementById(`txt-map-${key}`);
            if(mapText) mapText.textContent = sysList[key];
        });

        updateBreadcrumbs();
        if(currentStep === 5) renderFilteredCardsAndGauge();
        if(currentStep === 1) setTimeout(calculateCarouselBounds, 50);
    }

    function initBrandsCarousel() {
        track.innerHTML = ''; let buffer = '';
        Object.keys(vehicleData).forEach(key => {
            const item = vehicleData[key];
            buffer += `
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <div class="circle-item" data-key="${key}">
                        <div class="circle-icon-placeholder">${item.initials}</div>
                    </div>
                    <div class="circle-label">${item.name}</div>
                </div>`;
        });
        track.innerHTML = buffer + buffer + buffer;
        track.querySelectorAll('.circle-item').forEach(card => {
            card.addEventListener('click', function() { if (!wasDragged) selectBrand(this.getAttribute('data-key')); });
        });
        setTimeout(calculateCarouselBounds, 100);
    }

    function calculateCarouselBounds() {
        singleSetWidth = track.scrollWidth / 3;
        baseCenter = (viewport.clientWidth / 2) - (singleSetWidth / 2) - 52;
        currentTranslate = baseCenter;
        track.style.transition = 'none';
        track.style.transform = `translateX(${currentTranslate}px)`;
    }

    viewport.addEventListener('mousedown', (e) => { if(currentStep !== 1) return; isDragging = true; wasDragged = false; startX = e.clientX; startTranslate = currentTranslate; track.style.transition = 'none'; });
    viewport.addEventListener('mousemove', (e) => {
        if (!isDragging || currentStep !== 1) return;
        const deltaX = e.clientX - startX; if (Math.abs(deltaX) > 5) wasDragged = true;
        currentTranslate = startTranslate + deltaX;
        if (currentTranslate > baseCenter + singleSetWidth / 2) currentTranslate -= singleSetWidth;
        else if (currentTranslate <= baseCenter - singleSetWidth / 2) currentTranslate += singleSetWidth;
        track.style.transform = `translateX(${currentTranslate}px)`;
    });
    const endDrag = () => { isDragging = false; track.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)'; };
    viewport.addEventListener('mouseup', endDrag); viewport.addEventListener('mouseleave', endDrag);

    function updateStepView(stepNum) {
        currentStep = stepNum;
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`step-${stepNum}`).classList.add('active');
        document.getElementById('backBtn').style.visibility = (stepNum > 1) ? 'visible' : 'hidden';
        document.getElementById('homeBtn').style.visibility = (stepNum > 1) ? 'visible' : 'hidden';
        document.getElementById('cartWrapper').style.visibility = (stepNum === 5) ? 'visible' : 'hidden';
        if(stepNum === 1) setTimeout(calculateCarouselBounds, 50);
        updateBreadcrumbs();
    }

    function updateBreadcrumbs() {
        let labels = { tn: "البداية", ar: "البداية", fr: "Acceuil", en: "Home" };
        let bText = labels[currentLang];
        if(selectedBrand) bText += ` / ${vehicleData[selectedBrand].name}`;
        if(selectedModel) bText += ` / ${selectedModel}`;
        if(selectedVariant) bText += ` / ${selectedVariant}`;
        if(selectedYear) bText += ` / ${selectedYear}`;
        document.getElementById('breadcrumbs').innerText = bText;
    }

    function selectBrand(brandKey) {
        selectedBrand = brandKey;
        const grid = document.getElementById('modelsGrid');
        grid.innerHTML = '';
        Object.keys(vehicleData[brandKey].models).forEach(modelName => {
            grid.innerHTML += `
                <div class="model-card" onclick="selectModel('${modelName}')">
                    <div class="model-img-placeholder">🚗 IMAGE</div>
                    <div style="font-weight:bold; font-size:14px;">${modelName}</div>
                </div>`;
        });
        updateStepView(2);
    }

    function selectModel(modelName) {
        selectedModel = modelName;
        const grid = document.getElementById('variantsGrid');
        grid.innerHTML = '';
        vehicleData[selectedBrand].models[modelName].forEach(variant => {
            grid.innerHTML += `<div class="chip-item" onclick="selectVariant('${variant}')">${variant}</div>`;
        });
        updateStepView(3);
    }

    function selectVariant(variantName) {
        selectedVariant = variantName;
        const grid = document.getElementById('yearsGrid');
        grid.innerHTML = '';
        ['2012', '2011', '2010', '2009'].forEach(year => {
            grid.innerHTML += `<div class="chip-item" onclick="selectYear('${year}')">${year}</div>`;
        });
        updateStepView(4);
    }

    function selectYear(yearValue) {
        selectedYear = yearValue;
        buildMiniCategories();
        selectSubSysFromMap('Engine');
        updateStepView(5);
    }

    function buildMiniCategories() {
        const trackContainer = document.getElementById('categoryCircleTrack');
        trackContainer.innerHTML = '';
        const cats = catalogData[activeSubSys].categories;
        
        let first = true;
        Object.keys(cats).forEach(catName => {
            if(first) { activeCategory = catName; first = false; }
            trackContainer.innerHTML += `
                <div style="display:flex; flex-direction:column; align-items:center;" onclick="selectCategoryFluidly('${catName}')">
                    <div class="circle-item-mini ${activeCategory === catName ? 'active-cat' : ''}" id="catMini-${catName}">
                        <div class="circle-icon-placeholder">${cats[catName].icon}</div>
                    </div>
                    <div class="circle-label-mini">${catName}</div>
                </div>`;
        });
    }

    function selectCategoryFluidly(catName) {
        activeCategory = catName;
        document.querySelectorAll('.circle-item-mini').forEach(item => item.classList.remove('active-cat'));
        const activeItem = document.getElementById(`catMini-${catName}`);
        if(activeItem) activeItem.classList.add('active-cat');
        renderFilteredCardsAndGauge();
    }

    function selectSubSysFromMap(sysKey) {
        activeSubSys = sysKey;
        document.querySelectorAll('.subsystem-group').forEach(el => el.classList.remove('selected-sys'));
        document.querySelectorAll('.sidebar-item-text').forEach(el => el.classList.remove('selected-sys'));
        
        document.getElementById(`sys-${sysKey}`).classList.add('selected-sys');
        document.getElementById(`side-${sysKey}`).classList.add('selected-sys');
        
        buildMiniCategories();
        renderFilteredCardsAndGauge();
    }

    function selectConditionFromTag(condKey) {
        activeCondition = condKey;
        document.getElementById('tc-new').classList.remove('active');
        document.getElementById('tc-used').classList.remove('active');
        document.getElementById(`tc-${condKey}`).classList.add('active');
        
        const subWrapper = document.getElementById('subConditionWrapper');
        if(condKey === 'used') {
            subWrapper.style.display = 'flex';
            activeSubCondition = 'all';
            document.querySelectorAll('#subConditionWrapper .tag-filter').forEach(el => el.classList.remove('active'));
            document.getElementById('tsc-all').classList.add('active');
        } else {
            subWrapper.style.display = 'none';
            activeSubCondition = '';
        }
        renderFilteredCardsAndGauge();
    }

    function setSubConditionTag(subCondKey) {
        activeSubCondition = subCondKey;
        document.querySelectorAll('#subConditionWrapper .tag-filter').forEach(el => el.classList.remove('active'));
        if(subCondKey === 'all') document.getElementById('tsc-all').classList.add('active');
        else if(subCondKey === 'used like new') document.getElementById('tsc-likenew').classList.add('active');
        else if(subCondKey === 'used') document.getElementById('tsc-used').classList.add('active');
        else if(subCondKey === 'trash') document.getElementById('tsc-trash').classList.add('active');
        renderFilteredCardsAndGauge();
    }

    function renderFilteredCardsAndGauge() {
        const grid = document.getElementById('partsGrid');
        grid.innerHTML = '';
        
        const systemData = catalogData[activeSubSys];
        if(!systemData) return;

        let filtered = systemData.parts.filter(p => {
            let mCat = p.cat === activeCategory;
            let mCond = p.cond === activeCondition;
            let mSub = true;
            if(activeCondition === 'used' && activeSubCondition !== 'all') {
                mSub = p.subCond === activeSubCondition;
            }
            return mCat && mCond && mSub;
        });

        filtered.forEach(part => {
            let percentage = Math.min(100, Math.round((part.price / part.marketReference) * 100));
            let gaugeColor = 'var(--neon-green)';
            let statusText = dictionary[currentLang].safe;

            if(percentage > 75 && percentage <= 95) {
                gaugeColor = 'var(--neon-amber)';
                statusText = dictionary[currentLang].warning;
            } else if(percentage > 95) {
                gaugeColor = 'var(--neon-red)';
                statusText = dictionary[currentLang].alert;
            }

            grid.innerHTML += `
                <div class="part-card">
                    <div class="part-img-box" onclick="openImagePreview('${part.img}', '${part.name}', ${part.price})">${part.img}</div>
                    <div class="part-title">${part.name}</div>
                    <div class="part-badges">
                        <span class="badge ${part.cond === 'new' ? 'badge-new' : 'badge-used'}">${part.cond.toUpperCase()}</span>
                        ${part.subCond ? `<span class="badge badge-sub">${part.subCond}</span>` : ''}
                    </div>
                    <div class="part-price-zone">
                        <div class="price-row">
                            <span class="part-price">${part.price}.000 DT</span>
                        </div>
                        <div class="price-row">
                            <span class="reference-new-label">${dictionary[currentLang].refNewLabel}</span>
                            <span class="reference-new-value">${part.marketReference}.000 DT</span>
                        </div>
                    </div>
                    <div class="part-micro-gauge-box">
                        <div class="gauge-label-container">
                            <span>${dictionary[currentLang].marketState}</span>
                            <span class="gauge-status-text" style="color: ${gaugeColor}">${statusText} (${percentage}%)</span>
                        </div>
                        <div class="micro-gauge-bar-bg">
                            <div class="micro-gauge-bar-fill" style="width: ${percentage}%; background-color: ${gaugeColor}"></div>
                        </div>
                    </div>
                    <button class="buy-btn" onclick="addToCart(${part.price})">🛒 أضف للطلب</button>
                </div>`;
        });
    }

    function addToCart(price) {
        cartItemCount++;
        cartTotalAmount += price;
        document.getElementById('cartCount').innerText = cartItemCount;
        document.getElementById('cartTotal').innerText = `${cartTotalAmount}.000 DT`;
    }

    function openImagePreview(img, name, price) {
        document.getElementById('modalImg').innerText = img;
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalPrice').innerText = `${price}.000 DT`;
        document.getElementById('modalBuyBtn').setAttribute('onclick', `addToCart(${price}); toggleModal(false);`);
        toggleModal(true);
    }

    function closeImagePreview(e) { toggleModal(false); }
    function toggleModal(show) {
        const modal = document.getElementById('imageModal');
        if(show) modal.classList.add('active');
        else modal.classList.remove('active');
    }

    function goBack() {
        if (currentStep > 1) updateStepView(currentStep - 1);
    }

    function goHome() {
        selectedBrand = ''; selectedModel = ''; selectedVariant = ''; selectedYear = '';
        updateStepView(1);
    }
</script>
</body>
</html>
